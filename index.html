<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafePass</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>SafePass Manager</h1>
        
        <form id="password-form">
            <input type="hidden" id="edit-index">
            <div class="input-group">
                <input type="text" id="service-name" placeholder="Назва сервісу (напр. Google)" required>
                <input type="text" id="login" placeholder="Логін / Email" required>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Пароль" required>
                </div>
            </div>
            <button type="submit" id="submit-btn">Додати запис</button>
        </form>

        <div class="list-container">
            <h2>Ваші збережені сервіси</h2>
            <ul id="password-list">
                </ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
